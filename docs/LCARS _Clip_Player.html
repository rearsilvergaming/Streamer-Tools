<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>RearSilver LCARS Shoutout Player</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: Helvetica, Arial, sans-serif;
      }

      body {
        position: relative;
      }

      :root {
        --lcars-gold: #e6bc72;
        --lcars-gold-2: #efc66d;
        --lcars-lilac: #c7a2d8;
        --lcars-salmon: #d48a7a;
        --lcars-beige: #d9c7a1;
        --lcars-dark: rgba(10, 12, 17, 0.96);
        --lcars-dark-2: rgba(16, 18, 24, 0.94);
        --lcars-border: rgba(255, 255, 255, 0.08);
        --lcars-text: #f2f2f2;
        --lcars-muted: #16120f;
      }

      /* Main module */
      #main-container {
        position: absolute;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        width: 920px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        opacity: 1;
        box-sizing: border-box;
      }

      /* Top LCARS header strip */
      #header-strip {
        display: flex;
        align-items: stretch;
        gap: 0;
        height: 34px;
      }

      .header-block {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: #16120f;
        box-sizing: border-box;
        padding: 0 12px;
      }

      .header-block.left {
        width: 120px;
        background: var(--lcars-lilac);
        border-radius: 18px 0 0 18px;
      }

      .header-block.mid {
        flex: 1;
        background: var(--lcars-beige);
        border-left: 3px solid rgba(0, 0, 0, 0.25);
        border-right: 3px solid rgba(0, 0, 0, 0.25);
      }

      .header-block.right {
        width: 150px;
        background: var(--lcars-gold);
        border-radius: 0 18px 18px 0;
      }

      /* Video module */
      #videocontainer {
        position: relative;
        width: 100%;
        background: linear-gradient(
          to bottom,
          rgba(16, 18, 24, 0.96) 0%,
          rgba(10, 12, 17, 0.98) 100%
        );
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 0 14px 14px 14px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.42);
        box-sizing: border-box;
      }

      #videocontainer::after {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 8px;
        background: var(--lcars-gold);
        pointer-events: none;
        z-index: 1;
      }

      #videoplayer {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        visibility: hidden;
        background: #000;
      }

      /* Lower info module */
      #info-overlay {
        width: 100%;
        display: grid;
        grid-template-columns: 88px minmax(0, 1fr);
        align-items: start;
        column-gap: 8px;
        pointer-events: none;
        opacity: 1;
        transition: opacity 0.35s ease-in-out;
        box-sizing: border-box;
      }

      #info-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* Avatar panel */
      #image-panel {
        width: 100%;
        min-height: 206px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          to bottom,
          rgba(16, 18, 24, 0.96) 0%,
          rgba(10, 12, 17, 0.98) 100%
        );
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 0 10px 10px 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.42);
        position: relative;
        overflow: hidden;
        box-sizing: border-box;
        padding: 10px 8px 10px 14px;
      }

      #image-panel::after {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 8px;
        background: var(--lcars-salmon);
        pointer-events: none;
        z-index: 1;
      }

      #image-panel::before {
        content: "SOURCE";
        position: absolute;
        top: 8px;
        left: 12px;
        font-size: 8px;
        font-weight: 800;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        color: var(--lcars-salmon);
        opacity: 0.95;
        z-index: 2;
      }

      #imagebox2 {
        width: 64px;
        height: 64px;
        margin: 0 auto;
        border-radius: 50%;
        overflow: hidden;
        border: 3px solid var(--lcars-gold);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45);
        flex: 0 0 auto;
        position: relative;
        z-index: 2;
      }

      #imagebox2 img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* Text stack */
      #text-container {
        width: 100%;
        min-width: 0;
        display: grid;
        grid-template-rows: repeat(4, minmax(0, auto));
        row-gap: 6px;
        box-sizing: border-box;
      }

      .lcars-row {
        width: 100%;
        min-width: 0;
        box-sizing: border-box;
        padding: 7px 10px 8px 14px;
        background: linear-gradient(
          to bottom,
          rgba(16, 18, 24, 0.96) 0%,
          rgba(10, 12, 17, 0.98) 100%
        );
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 0 10px 10px 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.42);
        position: relative;
        overflow: hidden;
      }

      .lcars-row::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 8px;
        background: var(--lcars-gold);
        pointer-events: none;
        z-index: 1;
      }

      .lcars-row.primary::before {
        background: var(--lcars-gold);
      }

      .lcars-row.secondary::before {
        background: var(--lcars-lilac);
      }

      .lcars-row.tertiary::before {
        background: var(--lcars-salmon);
      }

      .lcars-row.primary {
        border-left-color: var(--lcars-gold);
      }

      .lcars-row.secondary {
        border-left-color: var(--lcars-lilac);
      }

      .lcars-row.tertiary {
        border-left-color: var(--lcars-salmon);
      }

      .row-inner {
        position: relative;
        z-index: 2;
        padding-top: 0;
      }

      .label {
        font-size: 8px;
        font-weight: 800;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        color: var(--lcars-gold);
        margin-bottom: 4px;
        line-height: 1;
      }

      .value {
        color: var(--lcars-text);
        font-size: 15px;
        font-weight: 700;
        line-height: 1.2;
        word-break: break-word;
      }

      #username.value {
        font-size: 17px;
        font-weight: 900;
        letter-spacing: 0.35px;
        text-transform: uppercase;
      }

      /* Hidden state cleanup */
      #videocontainer.hidden,
      #main-container.hidden {
        opacity: 0;
      }
    </style>
  </head>
  <body onload="shoutout()">
    <div id="main-container">
      <div id="header-strip">
        <div class="header-block left">LCARS</div>
        <div class="header-block mid">Shoutout Transmission</div>
        <div class="header-block right">Clip Playback</div>
      </div>

      <div id="videocontainer">
        <video
          id="videoplayer"
          autoplay
          onended="setTimeout('cleanup()', 500)"
        ></video>
      </div>

      <div id="info-overlay" class="hidden">
        <div id="image-panel">
          <div id="imagebox2"></div>
        </div>

        <div id="text-container">
          <div class="lcars-row primary">
            <div class="row-inner">
              <div class="label">Signal Target</div>
              <div class="value" id="username"></div>
            </div>
          </div>

          <div class="lcars-row secondary">
            <div class="row-inner">
              <div class="label">Clip Title</div>
              <div class="value" id="clip-title"></div>
            </div>
          </div>

          <div class="lcars-row tertiary">
            <div class="row-inner">
              <div class="label">Archived By</div>
              <div class="value" id="clip-user"></div>
            </div>
          </div>

          <div class="lcars-row primary">
            <div class="row-inner">
              <div class="label">Views</div>
              <div class="value" id="views"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function showVideo() {
        const videoElement = document.getElementById("videoplayer");
        videoElement.style.visibility = "visible";
        videoElement.play();
      }

      async function shoutout() {
        const urlParams = new URLSearchParams(window.location.search);
        const overlay = document.getElementById("info-overlay");
        overlay.classList.remove("hidden");

        const user = urlParams.get("user");
        const clipUser = urlParams.get("clip_user");
        const image = urlParams.get("image");
        const video = urlParams.get("video");
        const clipTitle = urlParams.get("title");
        const views = urlParams.get("views");

        document.getElementById("username").textContent =
          `Shout out to ${user}!`;
        document.getElementById("clip-title").textContent = clipTitle || "";
        document.getElementById("clip-user").textContent =
          `Clipped by ${clipUser}`;
        document.getElementById("views").textContent = views || "0";
        document.getElementById("imagebox2").innerHTML =
          `<img src="${image}" width="100%" />`;

        const videoElement = document.getElementById("videoplayer");

        const match = video.match(/clip=([^"]+)/);
        const fullClipId = match ? match[1] : null;
        const match2 = fullClipId ? fullClipId.match(/([^/]+)$/) : null;
        const clipId = match2 ? match2[1] : null;

        const url = "https://gql.twitch.tv/gql";
        const query = {
          operationName: "VideoAccessToken_Clip",
          variables: {
            platform: "web",
            slug: clipId,
          },
          extensions: {
            persistedQuery: {
              version: 1,
              sha256Hash:
                "6fd3af2b22989506269b9ac02dd87eb4a6688392d67d94e41a6886f1e9f5c00f",
            },
          },
        };

        const xhr = new XMLHttpRequest();
        xhr.open("POST", url, false);
        xhr.setRequestHeader("Content-Type", "text/plain;charset=UTF-8");
        xhr.setRequestHeader("Client-ID", "kimne78kx3ncx6brgo4mv6wki5h1ko");
        xhr.send(JSON.stringify(query));

        if (xhr.status === 200) {
          const clipInfo = JSON.parse(xhr.responseText);
          const clipData = clipInfo.data;
          const clipSource = clipData.clip.videoQualities[0].sourceURL;
          const clipSig = clipData.clip.playbackAccessToken.signature;
          const clipToken = clipData.clip.playbackAccessToken.value;
          const videoSrc =
            clipSource + "?sig=" + clipSig + "&token=" + encodeURI(clipToken);

          videoElement.src = videoSrc;
          videoElement.load();
          await videoElement.play();
        } else {
          console.error("Request failed with status: " + xhr.status);
        }

        videoElement.style.visibility = "hidden";
        setTimeout("showVideo();", 1000);
      }

      function cleanup() {
        document.getElementById("videocontainer").innerHTML = "";
        const overlay = document.getElementById("info-overlay");
        overlay.classList.add("hidden");
      }
    </script>
  </body>
</html>
