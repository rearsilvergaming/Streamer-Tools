<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>RearSilver Nexus Command Shoutout Player</title>

    <style>
      :root {
        --text: #f7f2e8;
        --muted: rgba(247, 242, 232, 0.64);
        --cyan: #42e8ff;
        --gold: #f0be65;
        --green: #75f0a8;
        --purple: #c8a7ff;
        --red: #ff7d7d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
        color: var(--text);
      }

      body {
        position: relative;
        pointer-events: none;
      }

      #main-container {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 12px;
        padding: 16px 22px;
        opacity: 1;
      }

      #main-container.hidden {
        opacity: 0;
      }

      .header {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: start;
        gap: 18px;
        padding: 13px 16px;
        border-radius: 18px;
        background:
          radial-gradient(
            circle at top left,
            rgba(66, 232, 255, 0.18),
            transparent 38%
          ),
          linear-gradient(135deg, rgba(7, 12, 18, 0.96), rgba(18, 25, 36, 0.94));
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow:
          0 12px 32px rgba(0, 0, 0, 0.38),
          inset 0 0 0 1px rgba(255, 255, 255, 0.035);
      }

      .eyebrow {
        margin-bottom: 5px;
        color: var(--cyan);
        font-size: 10px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: 2.2px;
        text-transform: uppercase;
      }

      .title {
        color: var(--text);
        font-size: 26px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: 0.6px;
        text-transform: uppercase;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 11px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--muted);
        font-size: 9px;
        line-height: 1;
        font-weight: 800;
        letter-spacing: 0.8px;
        text-transform: uppercase;
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 9px rgba(117, 240, 168, 0.82);
      }

      #videocontainer {
        position: relative;
        min-height: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 22px;
        background:
          radial-gradient(
            circle at center,
            rgba(66, 232, 255, 0.08),
            transparent 58%
          ),
          rgba(4, 8, 13, 0.98);
        border: 1px solid rgba(66, 232, 255, 0.22);
        box-shadow:
          0 0 34px rgba(66, 232, 255, 0.12),
          0 24px 70px rgba(0, 0, 0, 0.52),
          inset 0 0 36px rgba(66, 232, 255, 0.05);
      }

      #videocontainer::before {
        content: "ARCHIVED SIGNAL PLAYBACK";
        position: absolute;
        top: 12px;
        left: 14px;
        z-index: 3;
        color: rgba(247, 242, 232, 0.54);
        font-size: 8px;
        font-weight: 900;
        letter-spacing: 1.2px;
      }

      #videocontainer::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 2;
        background: linear-gradient(
          rgba(255, 255, 255, 0.018) 50%,
          rgba(0, 0, 0, 0.04) 50%
        );
        background-size: 100% 4px;
        opacity: 0.34;
        pointer-events: none;
      }

      #videoplayer {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        visibility: hidden;
        background: #000;
        position: relative;
        z-index: 1;
      }

      #info-overlay {
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr);
        gap: 10px;
        opacity: 1;
        transition: opacity 0.35s ease-in-out;
      }

      #info-overlay.hidden {
        opacity: 0;
      }

      #image-panel,
      .data-row {
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(
            circle at top left,
            rgba(66, 232, 255, 0.11),
            transparent 48%
          ),
          linear-gradient(135deg, rgba(8, 14, 21, 0.96), rgba(16, 23, 33, 0.94));
        border: 1px solid rgba(255, 255, 255, 0.085);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.025);
      }

      #image-panel {
        min-height: 142px;
        display: grid;
        place-items: center;
        border-radius: 17px;
      }

      #image-panel::before {
        content: "SOURCE";
        position: absolute;
        top: 9px;
        left: 10px;
        color: var(--muted);
        font-size: 8px;
        font-weight: 900;
        letter-spacing: 1px;
      }

      #imagebox2 {
        width: 76px;
        height: 76px;
        margin-top: 10px;
        overflow: hidden;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(66, 232, 255, 0.72);
        box-shadow: 0 0 22px rgba(66, 232, 255, 0.2);
      }

      #imagebox2 img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      #text-container {
        min-width: 0;
        display: grid;
        grid-template-columns: 1.35fr 1fr;
        grid-template-rows: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .data-row {
        min-width: 0;
        padding: 11px 13px;
        border-radius: 14px;
      }

      .data-row::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: var(--cyan);
      }

      .data-row.gold::before {
        background: var(--gold);
      }
      .data-row.purple::before {
        background: var(--purple);
      }
      .data-row.red::before {
        background: var(--red);
      }

      .row-inner {
        position: relative;
        z-index: 2;
      }

      .label {
        margin-bottom: 5px;
        color: var(--muted);
        font-size: 8px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: 1.1px;
        text-transform: uppercase;
      }

      .value {
        color: var(--text);
        font-size: 14px;
        line-height: 1.2;
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      #username.value {
        color: var(--cyan);
        font-size: 16px;
        font-weight: 900;
        letter-spacing: 0.25px;
        text-transform: uppercase;
      }

      #videocontainer.hidden {
        opacity: 0;
      }

      #video-debug {
        position: absolute;
        left: 14px;
        bottom: 12px;
        z-index: 10;
        padding: 7px 10px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.82);
        color: #42e8ff;
        font-size: 12px;
        font-weight: 800;
        pointer-events: none;
      }
    </style>
  </head>

  <body onload="shoutout()">
    <div id="main-container">
      <div class="header">
        <div>
          <div class="eyebrow">Nexus Command</div>
          <div class="title">Shoutout Transmission — DEBUG 7</div>
        </div>

        <div class="status">
          <span class="dot"></span>
          <span>Archive Linked</span>
        </div>
      </div>

      <div id="videocontainer">
        <video
          id="videoplayer"
          autoplay
          muted
          playsinline
          onended="setTimeout(cleanup, 500)"
        ></video>

        <div id="video-debug">Starting shoutout…</div>
      </div>

      <div id="info-overlay" class="hidden">
        <div id="image-panel">
          <div id="imagebox2"></div>
        </div>

        <div id="text-container">
          <div class="data-row">
            <div class="row-inner">
              <div class="label">Featured Signal</div>
              <div class="value" id="username"></div>
            </div>
          </div>

          <div class="data-row purple">
            <div class="row-inner">
              <div class="label">Clip Title</div>
              <div class="value" id="clip-title"></div>
            </div>
          </div>

          <div class="data-row red">
            <div class="row-inner">
              <div class="label">Archived By</div>
              <div class="value" id="clip-user"></div>
            </div>
          </div>

          <div class="data-row gold">
            <div class="row-inner">
              <div class="label">Recorded Views</div>
              <div class="value" id="views"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function setVideoDebug(message) {
        const debugElement = document.getElementById("video-debug");

        if (debugElement) {
          debugElement.textContent = message;
        }

        console.log("[Shoutout Player]", message);
      }

      async function showVideo() {
        const videoElement = document.getElementById("videoplayer");

        if (!videoElement) {
          setVideoDebug("ERROR: Video element not found");
          return;
        }

        videoElement.style.visibility = "visible";
        setVideoDebug("Calling video.play()");

        try {
          await videoElement.play();
          setVideoDebug("SUCCESS: Video is playing");
        } catch (error) {
          setVideoDebug(`PLAY FAILED: ${error.name} — ${error.message}`);
        }
      }

      async function shoutout() {
        setVideoDebug("Shoutout page started");

        const urlParams = new URLSearchParams(window.location.search);
        const overlay = document.getElementById("info-overlay");

        if (overlay) {
          overlay.classList.remove("hidden");
        }

        const user = urlParams.get("user");
        const clipUser = urlParams.get("clip_user");
        const image = urlParams.get("image");
        const video = urlParams.get("video");
        const clipTitle = urlParams.get("title");
        const views = urlParams.get("views");

        document.getElementById("username").textContent =
          `Shout out to ${user}!`;

        document.getElementById("clip-title").textContent = clipTitle || "";

        document.getElementById("clip-user").textContent =
          `Clipped by ${clipUser}`;

        document.getElementById("views").textContent = views || "0";

        if (image) {
          document.getElementById("imagebox2").innerHTML =
            `<img src="${image}" width="100%" />`;
        }

        const videoElement = document.getElementById("videoplayer");

        if (!videoElement) {
          setVideoDebug("ERROR: Video element not found");
          return;
        }

        let clipId = null;

        if (video) {
          const match = video.match(/clip=([^&"' >]+)/);

          if (match) {
            clipId = match[1].split("/").filter(Boolean).pop();
          } else {
            const cleanUrl = video.split("?")[0].replace(/\/$/, "");

            clipId = cleanUrl.split("/").filter(Boolean).pop();
          }
        }

        if (!clipId || clipId === "null" || clipId === "undefined") {
          setVideoDebug("ERROR: Could not extract clip ID");
          console.error("Could not parse a valid Clip ID from value:", video);
          return;
        }

        setVideoDebug(`Clip ID found: ${clipId}`);

        const url = "https://gql.twitch.tv/gql";

        const query = {
          operationName: "VideoAccessToken_Clip",

          variables: {
            slug: clipId,
          },

          query: `
        query VideoAccessToken_Clip($slug: ID!) {
          clip(slug: $slug) {
            playbackAccessToken(
              params: {
                platform: "web"
                playerBackend: "mediaplayer"
                playerType: "site"
              }
            ) {
              signature
              value
            }

            videoQualities {
              frameRate
              quality
              sourceURL
            }
          }
        }
      `,
        };

        try {
          setVideoDebug("Requesting Twitch playback data");

          const response = await fetch(url, {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
              "Client-ID": "kimne78kx3ncx6brgo4mv6wki5h1ko",
            },

            body: JSON.stringify(query),
          });

          setVideoDebug(`Twitch response received: HTTP ${response.status}`);

          if (!response.ok) {
            throw new Error(`Twitch GQL HTTP error status: ${response.status}`);
          }

          const clipInfo = await response.json();

          if (clipInfo.errors && clipInfo.errors.length > 0) {
            setVideoDebug(`TWITCH ERROR: ${clipInfo.errors[0].message}`);

            console.error("Twitch GraphQL returned errors:", clipInfo.errors);

            return;
          }

          const clipData = clipInfo.data?.clip;

          if (
            !clipData ||
            !Array.isArray(clipData.videoQualities) ||
            clipData.videoQualities.length === 0
          ) {
            setVideoDebug("ERROR: Twitch returned no video source");

            console.error(
              "Twitch did not return any media properties or video sources.",
            );

            return;
          }

          if (
            !clipData.playbackAccessToken?.signature ||
            !clipData.playbackAccessToken?.value
          ) {
            setVideoDebug("ERROR: Twitch returned no playback token");
            return;
          }

          const clipSource = clipData.videoQualities[0].sourceURL;

          const clipSig = clipData.playbackAccessToken.signature;

          const clipToken = clipData.playbackAccessToken.value;

          const videoSrc =
            clipSource +
            "?sig=" +
            encodeURIComponent(clipSig) +
            "&token=" +
            encodeURIComponent(clipToken);

          videoElement.addEventListener(
            "loadstart",
            () => {
              setVideoDebug("OBS started loading the MP4");
            },
            { once: true },
          );

          videoElement.addEventListener(
            "loadedmetadata",
            () => {
              setVideoDebug(`Metadata loaded: ${videoElement.duration}s`);
            },
            { once: true },
          );

          videoElement.addEventListener(
            "canplay",
            () => {
              setVideoDebug("Video can play");
            },
            { once: true },
          );

          videoElement.addEventListener(
            "playing",
            () => {
              setVideoDebug("SUCCESS: Video is playing");
            },
            { once: true },
          );

          videoElement.addEventListener(
            "error",
            () => {
              const mediaError = videoElement.error;

              setVideoDebug(
                `VIDEO ERROR ${mediaError?.code ?? "unknown"}: ${
                  mediaError?.message || "No error message"
                }`,
              );
            },
            { once: true },
          );

          setVideoDebug("Assigning signed MP4 source");

          videoElement.src = videoSrc;
          videoElement.load();
          videoElement.style.visibility = "hidden";

          setTimeout(showVideo, 1000);
        } catch (error) {
          setVideoDebug(`REQUEST FAILED: ${error.name} — ${error.message}`);

          console.error(
            "Failed handling Twitch clip source extraction:",
            error,
          );
        }
      }

      function cleanup() {
        const videoElement = document.getElementById("videoplayer");

        if (videoElement) {
          videoElement.pause();
          videoElement.removeAttribute("src");
          videoElement.load();
          videoElement.style.visibility = "hidden";
        }

        const overlay = document.getElementById("info-overlay");

        if (overlay) {
          overlay.classList.add("hidden");
        }

        setVideoDebug("Playback finished");
      }
    </script>
  </body>
</html>
