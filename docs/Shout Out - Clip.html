<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>RearSilver Nexus Command Shoutout Player</title>

    <style>
      :root {
        --text: #f7f2e8;
        --muted: rgba(247, 242, 232, 0.64);
        --cyan: #42e8ff;
        --gold: #f0be65;
        --green: #75f0a8;
        --purple: #c8a7ff;
        --red: #ff7d7d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
        color: var(--text);
      }

      body {
        position: relative;
        pointer-events: none;
      }

      #main-container {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 12px;
        padding: 16px 22px;
        opacity: 1;
      }

      #main-container.hidden {
        opacity: 0;
      }

      .header {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: start;
        gap: 18px;
        padding: 13px 16px;
        border-radius: 18px;
        background:
          radial-gradient(
            circle at top left,
            rgba(66, 232, 255, 0.18),
            transparent 38%
          ),
          linear-gradient(135deg, rgba(7, 12, 18, 0.96), rgba(18, 25, 36, 0.94));
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow:
          0 12px 32px rgba(0, 0, 0, 0.38),
          inset 0 0 0 1px rgba(255, 255, 255, 0.035);
      }

      .eyebrow {
        margin-bottom: 5px;
        color: var(--cyan);
        font-size: 10px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: 2.2px;
        text-transform: uppercase;
      }

      .title {
        color: var(--text);
        font-size: 26px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: 0.6px;
        text-transform: uppercase;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 11px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--muted);
        font-size: 9px;
        line-height: 1;
        font-weight: 800;
        letter-spacing: 0.8px;
        text-transform: uppercase;
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 9px rgba(117, 240, 168, 0.82);
      }

      #videocontainer {
        position: relative;
        min-height: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 22px;
        background:
          radial-gradient(
            circle at center,
            rgba(66, 232, 255, 0.08),
            transparent 58%
          ),
          rgba(4, 8, 13, 0.98);
        border: 1px solid rgba(66, 232, 255, 0.22);
        box-shadow:
          0 0 34px rgba(66, 232, 255, 0.12),
          0 24px 70px rgba(0, 0, 0, 0.52),
          inset 0 0 36px rgba(66, 232, 255, 0.05);
      }

      #videocontainer::before {
        content: "ARCHIVED SIGNAL PLAYBACK";
        position: absolute;
        top: 12px;
        left: 14px;
        z-index: 3;
        color: rgba(247, 242, 232, 0.54);
        font-size: 8px;
        font-weight: 900;
        letter-spacing: 1.2px;
      }

      #videocontainer::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 2;
        background: linear-gradient(
          rgba(255, 255, 255, 0.018) 50%,
          rgba(0, 0, 0, 0.04) 50%
        );
        background-size: 100% 4px;
        opacity: 0.34;
        pointer-events: none;
      }

      #videoplayer {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        visibility: hidden;
        background: #000;
        position: relative;
        z-index: 1;
      }

      #info-overlay {
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr);
        gap: 10px;
        opacity: 1;
        transition: opacity 0.35s ease-in-out;
      }

      #info-overlay.hidden {
        opacity: 0;
      }

      #image-panel,
      .data-row {
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(
            circle at top left,
            rgba(66, 232, 255, 0.11),
            transparent 48%
          ),
          linear-gradient(135deg, rgba(8, 14, 21, 0.96), rgba(16, 23, 33, 0.94));
        border: 1px solid rgba(255, 255, 255, 0.085);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.025);
      }

      #image-panel {
        min-height: 142px;
        display: grid;
        place-items: center;
        border-radius: 17px;
      }

      #image-panel::before {
        content: "SOURCE";
        position: absolute;
        top: 9px;
        left: 10px;
        color: var(--muted);
        font-size: 8px;
        font-weight: 900;
        letter-spacing: 1px;
      }

      #imagebox2 {
        width: 76px;
        height: 76px;
        margin-top: 10px;
        overflow: hidden;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(66, 232, 255, 0.72);
        box-shadow: 0 0 22px rgba(66, 232, 255, 0.2);
      }

      #imagebox2 img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      #text-container {
        min-width: 0;
        display: grid;
        grid-template-columns: 1.35fr 1fr;
        grid-template-rows: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .data-row {
        min-width: 0;
        padding: 11px 13px;
        border-radius: 14px;
      }

      .data-row::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: var(--cyan);
      }

      .data-row.gold::before {
        background: var(--gold);
      }
      .data-row.purple::before {
        background: var(--purple);
      }
      .data-row.red::before {
        background: var(--red);
      }

      .row-inner {
        position: relative;
        z-index: 2;
      }

      .label {
        margin-bottom: 5px;
        color: var(--muted);
        font-size: 8px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: 1.1px;
        text-transform: uppercase;
      }

      .value {
        color: var(--text);
        font-size: 14px;
        line-height: 1.2;
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      #username.value {
        color: var(--cyan);
        font-size: 16px;
        font-weight: 900;
        letter-spacing: 0.25px;
        text-transform: uppercase;
      }

      #videocontainer.hidden {
        opacity: 0;
      }
    </style>
  </head>

  <body onload="shoutout()">
    <div id="main-container">
      <div class="header">
        <div>
          <div class="eyebrow">Nexus Command</div>
          <div class="title">Shoutout Transmission</div>
        </div>

        <div class="status">
          <span class="dot"></span>
          <span>Archive Linked</span>
        </div>
      </div>

      <div id="videocontainer">
        <video
          id="videoplayer"
          autoplay
          onended="setTimeout('cleanup()', 500)"
        ></video>
      </div>

      <div id="info-overlay" class="hidden">
        <div id="image-panel">
          <div id="imagebox2"></div>
        </div>

        <div id="text-container">
          <div class="data-row">
            <div class="row-inner">
              <div class="label">Featured Signal</div>
              <div class="value" id="username"></div>
            </div>
          </div>

          <div class="data-row purple">
            <div class="row-inner">
              <div class="label">Clip Title</div>
              <div class="value" id="clip-title"></div>
            </div>
          </div>

          <div class="data-row red">
            <div class="row-inner">
              <div class="label">Archived By</div>
              <div class="value" id="clip-user"></div>
            </div>
          </div>

          <div class="data-row gold">
            <div class="row-inner">
              <div class="label">Recorded Views</div>
              <div class="value" id="views"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      async function showVideo() {
        const videoElement = document.getElementById("videoplayer");

        // Make the loaded video visible before attempting playback.
        // Otherwise an autoplay rejection leaves the player permanently hidden.
        videoElement.style.visibility = "visible";

        try {
          await videoElement.play();
          console.log("Clip playback started successfully.");
        } catch (error) {
          console.error("Clip loaded, but playback was blocked:", error);

          // Useful when testing in a normal browser.
          // OBS may still autoplay it normally.
          videoElement.controls = true;
        }
      }

      async function shoutout() {
        const urlParams = new URLSearchParams(window.location.search);
        const overlay = document.getElementById("info-overlay");
        const videoElement = document.getElementById("videoplayer");

        overlay.classList.remove("hidden");

        const user = urlParams.get("user");
        const clipUser = urlParams.get("clip_user");
        const image = urlParams.get("image");
        const video = urlParams.get("video");
        const clipTitle = urlParams.get("title");
        const views = urlParams.get("views");

        document.getElementById("username").textContent =
          `Shout out to ${user || "Unknown user"}!`;

        document.getElementById("clip-title").textContent = clipTitle || "";

        document.getElementById("clip-user").textContent =
          `Clipped by ${clipUser || "Unknown user"}`;

        document.getElementById("views").textContent = views || "0";

        if (image) {
          const profileImage = document.createElement("img");
          profileImage.src = image;
          profileImage.alt = "";
          profileImage.width = 76;
          profileImage.height = 76;

          const imageBox = document.getElementById("imagebox2");
          imageBox.replaceChildren(profileImage);
        }

        if (!video) {
          console.error("No video parameter was supplied.");
          return;
        }

        /*
      Accepts:
      https://www.twitch.tv/embed?clip=channel/clip/ClipSlug
      https://clips.twitch.tv/ClipSlug
      https://www.twitch.tv/channel/clip/ClipSlug
      ClipSlug
    */
        let clipId = null;

        try {
          const suppliedUrl = new URL(video);
          const clipParameter = suppliedUrl.searchParams.get("clip");

          if (clipParameter) {
            clipId = clipParameter.split("/").filter(Boolean).pop();
          } else {
            clipId = suppliedUrl.pathname.split("/").filter(Boolean).pop();
          }
        } catch {
          clipId = video.split("/").filter(Boolean).pop()?.split("?")[0];
        }

        if (!clipId) {
          console.error("Could not extract a Twitch clip ID from:", video);
          return;
        }

        console.log("Supplied video parameter:", video);
        console.log("Extracted clip ID:", clipId);

        const url = "https://gql.twitch.tv/gql";

        const query = {
          operationName: "VideoAccessToken_Clip",

          variables: {
            slug: clipId,
          },

          query: `
    query VideoAccessToken_Clip($slug: ID!) {
      clip(slug: $slug) {
        playbackAccessToken(
          params: {
            platform: "web"
            playerBackend: "mediaplayer"
            playerType: "site"
          }
        ) {
          signature
          value
        }

        videoQualities {
          frameRate
          quality
          sourceURL
        }
      }
    }
  `,
        };

        let response;

        try {
          response = await fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "text/plain;charset=UTF-8",
              "Client-ID": "kimne78kx3ncx6brgo4mv6wki5h1ko",
            },
            body: JSON.stringify(query),
          });
        } catch (error) {
          console.error("The Twitch GraphQL request could not be sent:", error);
          return;
        }

        console.log("Twitch GraphQL HTTP status:", response.status);

        let clipInfo;

        try {
          clipInfo = await response.json();
        } catch (error) {
          console.error("Twitch returned an unreadable response:", error);
          return;
        }

        console.log("Twitch GraphQL response:", clipInfo);

        if (!response.ok) {
          console.error(
            `Twitch request failed with HTTP status ${response.status}.`,
            clipInfo,
          );
          return;
        }

        if (clipInfo.errors?.length) {
          console.error(
            "Twitch GraphQL returned errors:",
            JSON.stringify(clipInfo.errors, null, 2),
          );
          return;
        }

        const clipData = clipInfo?.data?.clip;

        if (!clipData) {
          console.error("Twitch returned no clip object:", clipInfo);
          return;
        }

        const videoQualities = clipData.videoQualities;
        const accessToken = clipData.playbackAccessToken;

        if (!Array.isArray(videoQualities) || videoQualities.length === 0) {
          console.error(
            "Twitch returned the clip but no video qualities:",
            clipData,
          );
          return;
        }

        if (!accessToken?.signature || !accessToken?.value) {
          console.error(
            "Twitch returned the clip but no usable playback token:",
            clipData,
          );
          return;
        }

        /*
      Prefer the highest available quality if Twitch supplies quality values.
      Fall back to the first entry if they are missing or non-numeric.
    */
        const selectedQuality =
          [...videoQualities].sort((a, b) => {
            const qualityA = Number.parseInt(a.quality, 10) || 0;
            const qualityB = Number.parseInt(b.quality, 10) || 0;
            return qualityB - qualityA;
          })[0] || videoQualities[0];

        const clipSource = selectedQuality.sourceURL;
        const clipSig = accessToken.signature;
        const clipToken = accessToken.value;

        if (!clipSource) {
          console.error(
            "Twitch returned a video-quality entry without a source URL:",
            selectedQuality,
          );
          return;
        }

        const videoSrc =
          clipSource +
          "?sig=" +
          encodeURIComponent(clipSig) +
          "&token=" +
          encodeURIComponent(clipToken);

        console.log("Selected Twitch video quality:", selectedQuality.quality);
        console.log("Unsigned clip source:", clipSource);
        console.log("Signed clip source was created.");

        videoElement.addEventListener(
          "loadedmetadata",
          () => {
            console.log(
              "Clip metadata loaded.",
              `Duration: ${videoElement.duration} seconds`,
            );
          },
          { once: true },
        );

        videoElement.addEventListener(
          "canplay",
          () => {
            console.log("Clip has buffered enough to begin playback.");
          },
          { once: true },
        );

        videoElement.addEventListener(
          "error",
          () => {
            const mediaError = videoElement.error;

            console.error("The browser failed to load the signed clip URL:", {
              code: mediaError?.code,
              message: mediaError?.message,
              networkState: videoElement.networkState,
              readyState: videoElement.readyState,
            });
          },
          { once: true },
        );

        videoElement.src = videoSrc;
        videoElement.load();

        // Keep your original one-second presentation delay.
        setTimeout(() => {
          showVideo();
        }, 1000);
      }

      function cleanup() {
        const videoElement = document.getElementById("videoplayer");

        if (videoElement) {
          videoElement.pause();
          videoElement.removeAttribute("src");
          videoElement.load();
        }

        const overlay = document.getElementById("info-overlay");
        overlay.classList.add("hidden");

        const mainContainer = document.getElementById("main-container");
        mainContainer.classList.add("hidden");
      }
    </script>
  </body>
</html>
